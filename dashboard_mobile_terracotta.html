<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ASIA LAB — Mobile Dashboard</title>
  <style>
    :root {
      /* Background & Base */
      --bg-primary: #7a9b8a;          /* Sage green */
      --bg-card: #f5f3f0;             /* Cream */
      --border-card: #e0d9d3;         /* Light border */

      /* Terracotta Color Ramp */
      --terracotta-light: #c4836f;    /* Sáng sớm 08:00-11:00 */
      --terracotta: #a85a4f;          /* Chiều 14:00-17:00 */
      --rust-dark: #8b4438;           /* Tối 18:00-21:00 */
      --urgent: #6b4a40;              /* Gấp < 2h */

      /* Text */
      --text-primary: #1a1a1a;        /* Black */
      --text-muted: #d0d0d0;          /* Light gray */
      --text-light: #e0e0e0;          /* Very light gray */

      /* Layout */
      --header-h: 56px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      font-size: 14px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════
       HEADER
    ═══════════════════════════════ */
    /* ═══════════════════════════════
       SEARCH BAR
    ═══════════════════════════════ */
    .search-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-card);
      height: var(--header-h);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .search-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      font-family: inherit;
      min-width: 0;
    }

    .search-bar input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }

    .search-bar input::-webkit-search-cancel-button {
      display: none;
    }

    .search-clear {
      flex-shrink: 0;
      display: none;
      font-size: 16px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
    }

    .search-clear.visible {
      display: block;
    }

    /* ═══════════════════════════════
       FILTER BAR
    ═══════════════════════════════ */
    .filter-bar {
      position: sticky;
      top: var(--header-h);
      z-index: 150;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-card);
      padding: 8px 10px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .fchip {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border-card);
      color: #666;
      background: transparent;
      transition: all .15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .fchip.active { background: var(--terracotta); border-color: var(--terracotta); color: #fff; }

    /* ═══════════════════════════════
       PH BADGE
    ═══════════════════════════════ */
    .ph-badge { display:inline-block; font-size:9px; font-weight:700; padding:2px 7px; border-radius:10px; border:1px solid; letter-spacing:.3px; white-space:nowrap; }
    .ph-zirc { color:#1a7fc1; border-color:rgba(26,127,193,.35); background:rgba(26,127,193,.1); }
    .ph-kl   { color:#555; border-color:rgba(100,100,100,.25); background:rgba(100,100,100,.07); }
    .ph-vnr  { color:#c94f6d; border-color:rgba(201,79,109,.3); background:rgba(201,79,109,.08); }
    .ph-hon  { color:#b5620a; border-color:rgba(181,98,10,.3); background:rgba(181,98,10,.08); }

    /* ═══════════════════════════════
       CARD LIST
    ═══════════════════════════════ */
    #cardList {
      padding: 0;
      padding-bottom: 20px;
    }

    .time-group {
      margin-bottom: 0;
    }

    .time-group-header {
      border-left: 4px solid;
      padding: 8px 12px;
      margin: 12px 12px 6px 12px;
      border-radius: 6px;
      display: flex;
      flex-direction: row;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
    }

    .time-group-header.morning,
    .time-group-header.noon,
    .time-group-header.afternoon,
    .time-group-header.evening,
    .time-group-header.urgent,
    .time-group-header.default {
      border-left-color: var(--terracotta);
      background: var(--bg-card);
    }

    .tg-time {
      font-family: 'Monaco', 'Courier New', monospace;
      font-weight: 700;
      font-size: 13px;
      color: var(--terracotta);
    }

    .tg-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .tg-date {
      font-size: 11px;
      color: var(--text-light);
    }

    .tg-count {
      font-size: 11px;
      color: var(--text-primary);
    }

    /* ═══════════════════════════════
       CARDS
    ═══════════════════════════════ */
    .tg-cards {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 12px;
    }

    .card {
      background: var(--terracotta-light);
      border: 1px solid var(--terracotta-light);
      border-left: 3px solid;
      border-radius: 8px;
      padding: 7px;
      cursor: pointer;
      transition: all 0.2s;
      animation: slideIn 0.3s ease-out backwards;
    }

    .card.morning { border-left-color: var(--terracotta-light); }
    .card.noon { border-left-color: var(--terracotta-light); }
    .card.afternoon { border-left-color: var(--terracotta); }
    .card.evening { border-left-color: var(--rust-dark); }
    .card.urgent { border-left-color: var(--urgent); }

    .card:active {
      transform: scale(0.98);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-row1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3px;
    }

    .order-code {
      font-family: 'Monaco', 'Courier New', monospace;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-primary);
    }

    .card-badges {
      display: flex;
      gap: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
    }

    .badge-urgent {
      background: rgba(168, 90, 79, 0.2);
      color: var(--urgent);
      border: 0.5px solid var(--urgent);
      font-weight: 700;
    }

    .card-row2 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
      font-size: 11px;
      font-weight: 500;
    }

    .card-patient {
      color: var(--text-primary);
      font-weight: 500;
    }

    .card-sl {
      color: #ffffff;
      font-weight: 600;
    }

    .card-customer {
      font-size: 10px;
      color: #ffffff;
      margin-bottom: 2px;
      font-weight: 600;
    }

    .card-prosthesis {
      font-size: 10px;
      color: #ffffff;
      margin-bottom: 2px;
      font-weight: 600;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 4px;
      border-top: 1px solid var(--border-card);
    }

    .card-stage-label {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 14px;
      font-weight: 500;
    }

    /* ── MODAL ─── */
    #modalOverlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      display: flex !important;
      align-items: center;
      justify-content: center;
    }
    #modalOverlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    #modalContent {
      width: 90%;
      max-width: 400px;
      max-height: 85vh;
      z-index: 1000;
    }

    /* ── STAGE PROGRESS DOTS ─── */
    .stage-pips {
      display: flex;
      gap: 4px;
      margin-bottom: 3px;
    }
    .stage-pip {
      flex: 1;
      height: 5px;
      border-radius: 3px;
      background: var(--border-card);
      position: relative;
      overflow: hidden;
    }
    .stage-pip.skip {
      opacity: 0.25;
      background: repeating-linear-gradient(90deg, var(--border-card) 0, var(--border-card) 3px, transparent 3px, transparent 6px);
    }
    .stage-pip .pip-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      border-radius: 3px;
      width: 0;
      transition: width 0.3s ease, box-shadow 0.3s ease;
    }
    .stage-pip.done .pip-fill {
      width: 100%;
      background: #2ed573;
      box-shadow: 0 0 6px rgba(46,213,115,.9), 0 0 12px rgba(46,213,115,.5);
    }
    .stage-pip.current .pip-fill {
      width: 50%;
      background: #f97316;
    }

    /* ── FONT SCALE +10% (~30% gốc - 15%) ─── */
    html { font-size: 15px; }
    .logo { font-size: 18px; }
    .hstat .n { font-size: 15px; }
    .hstat .l { font-size: 10px; }
    .header-date { font-size: 11px; }
    .stage-tab { font-size: 14px; }
    .toolbar-chip { font-size: 12px; }
    .tg-time { font-size: 14px; }
    .tg-date, .tg-count { font-size: 12px; }
    .order-code { font-size: 14px; }
    .badge { font-size: 10px; }
    .card-row2 { font-size: 12px; }
    .card-customer { font-size: 11px; }
    .card-prosthesis { font-size: 11px; }
    .card-stage-label { font-size: 11px; }
    .empty-state p { font-size: 15px; }
    #m-export-btn {
      flex-shrink: 0;
      font-size: 13px;
      color: var(--terracotta);
      padding: 4px 7px;
      border-radius: 6px;
      border: 1px solid var(--terracotta-light);
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      display: none;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      min-height: 32px;
    }
    #m-export-btn:active { opacity: 0.7; }
    #m-export-btn.admin-visible { display: inline-flex; }
  </style>
</head>
<body>
  <!-- Header -->
  <!-- Search Bar -->
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="search" placeholder="Tìm mã đơn, bệnh nhân, nha khoa..." autocomplete="off">
    <span class="search-clear" id="searchClear" onclick="clearSearch()">✕</span>
    <a id="m-upload-btn" href="/upload" title="Upload Excel" style="flex-shrink:0;font-size:13px;color:var(--text-muted);text-decoration:none;padding:4px 6px;border-radius:6px;border:1px solid var(--border-card);display:none;">📤</a>
    <button id="m-export-btn" onclick="triggerKeylabExport()" title="Xu&#7845;t Excel KeyLab">🔄</button>
    <a id="m-munger-btn" href="/munger" title="Munger Dashboard" style="flex-shrink:0;font-size:13px;color:var(--text-muted);text-decoration:none;padding:4px 6px;border-radius:6px;border:1px solid var(--border-card);display:none;">⚖️</a>
    <a id="m-baoloi-btn" href="/bao-loi" title="Báo lỗi" style="flex-shrink:0;font-size:13px;color:var(--terracotta);text-decoration:none;padding:4px 8px;border-radius:6px;border:1px solid var(--terracotta-light);font-weight:700;">⚠</a>
    <a href="/logout" title="Đăng xuất" style="flex-shrink:0;font-size:13px;color:var(--text-muted);text-decoration:none;padding:4px 6px;border-radius:6px;border:1px solid var(--border-card);">↩</a>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar" id="filterBar">
    <button class="fchip active" data-f="all"  onclick="setFilter(this,'all')">Tất cả</button>
    <button class="fchip" data-f="zirc" onclick="setFilter(this,'zirc')">Zirconia</button>
    <button class="fchip" data-f="kl"   onclick="setFilter(this,'kl')">Kim loại</button>
    <button class="fchip" data-f="vnr"  onclick="setFilter(this,'vnr')">Mặt dán</button>
  </div>

  <!-- Card List -->
  <div id="cardList"></div>

  <script>
    const STAGE_NAMES = ['CBM', 'SÁP/Cadcam', 'SƯỜN', 'ĐẮP', 'MÀI'];
    const STAGE_COLORS = {
      'CBM': '#3b82f6',
      'SÁP/Cadcam': '#a855f7',
      'SƯỜN': '#f59e0b',
      'ĐẮP': '#f97316',
      'MÀI': '#10b981'
    };

    const STAGE_SHORT = {
      'CBM': 'CBM',
      'SÁP/Cadcam': 'SÁP',
      'SƯỜN': 'SƯỜN',
      'ĐẮP': 'ĐẮP',
      'MÀI': 'MÀI',
      'HOÀN TẤT': '✓'
    };

    function adaptOrder(o) {
      let current_stage = 'HOÀN TẤT';
      if (o.stages) {
        const active = o.stages.find(s => !s.sk && !s.x);
        if (active) current_stage = active.n;
      }
      const urgent = o.yc_ht
        ? (new Date(o.yc_ht) - Date.now()) < 2 * 3600 * 1000
        : false;
      return {
        ma_dh:         o.ma_dh,
        benh_nhan:     o.bn || '',
        khach_hang:    o.kh || '',
        phuc_hinh:     o.ph || '',
        sl:            o.sl || 0,
        ghi_chu:       o.gc || '',
        current_stage,
        yc_ht:         o.yc_ht || '',
        yc_giao:       o.yc_giao || '',
        nhan:          o.nhan || '',
        loai_lenh:     o.lk || '',
        urgent,
        stagesData:    o.stages || [],
      };
    }

    function phType(ph) {
      const p = (ph || '').toLowerCase();
      if (p.includes('cùi giả zirconia') || p.includes('cui gia zirconia')) return 'hon';
      if (p.includes('mặt dán')) return 'vnr';
      if (p.includes('zircornia') || p.includes('zirconia') || p.includes('ziconia') ||
          p.includes('zir-') || p.includes('zolid') || p.includes('cercon') ||
          p.includes('la va') || p.includes('full zirconia')) return 'zirc';
      return 'kl';
    }
    function phShort(ph) {
      if (!ph) return 'SỨ';
      if (ph.includes('Zircornia') || ph.includes('Ziconia') || ph.includes('Zirconia') || ph.includes('Zolid')) return 'ZIRC';
      if (ph.includes('Diamond') || ph.includes('Zir-')) return 'ZIR-D';
      if (ph.includes('Cercon')) return 'CERCON';
      if (ph.includes('Titanium') || ph.includes('Titan')) return 'TITAN';
      if (ph.toLowerCase().includes('cùi giả zirconia')) return 'HON HỢP';
      if (ph.includes('Veneer') || ph.includes('Mặt dán')) return 'VENEER';
      if (ph.includes('Chrome')) return 'Cr-Co';
      if (ph.includes('Cùi')) return 'CÙI';
      if (ph.includes('La Va')) return 'LA VA';
      return 'KL';
    }

    let allOrders = [];
    let filterSearch = '';
    let filterPh = 'all';
    let currentUser = null;
    let userPendingOrders = [];

    function setFilter(el, f) {
      filterPh = f;
      document.querySelectorAll('#filterBar .fchip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      renderCards();
    }

    async function loadData() {
      try {
        if (currentUser?.role === 'user' && currentUser?.cong_doan) {
          await loadUserPendingOrders();
        } else {
          const res = await fetch('/data.json');
          const json = await res.json();
          allOrders = (json.orders || []).map(adaptOrder);
          updateCounts();
          renderCards();
        }
      } catch (e) {
        console.error('Lỗi fetch data:', e);
      }
    }

    async function loadUserPendingOrders() {
      try {
        const r = await fetch('/api/user/pending-orders');
        if (!r.ok) return;
        const data = await r.json();
        if (data.ok) {
          userPendingOrders = data.orders;
          allOrders = userPendingOrders.map(adaptOrder);
          updateCounts();
          renderCards();
        }
      } catch (e) {
        console.error('Lỗi fetch pending orders:', e);
      }
    }

    async function initUserContext() {
      try {
        const r = await fetch('/user');
        if (!r.ok) return;
        const u = await r.json();
        currentUser = u;
        if (u.role === 'user' && u.cong_doan) {
          setupUserMobile();
        }
      } catch {}
    }

    function setupUserMobile() {
      const filterBar = document.getElementById('filterBar');
      if (filterBar) filterBar.style.display = 'none';
      const searchBar = document.querySelector('.search-bar');
      if (searchBar) {
        const titleDiv = document.createElement('div');
        titleDiv.style.cssText = 'flex:1; font-weight: 600; font-size: 14px; color: var(--text-primary);';
        titleDiv.textContent = `${currentUser.cong_doan.toUpperCase()}`;
        const existingTitle = searchBar.querySelector('[data-title]');
        if (existingTitle) existingTitle.remove();
        titleDiv.setAttribute('data-title', '1');
        searchBar.insertBefore(titleDiv, searchBar.firstChild);
      }
    }

    // ═════════════════════════════════════════════════════════════
    // HELPERS
    // ═════════════════════════════════════════════════════════════
    function getCompletionTimeGroup(yc_ht) {
      if (!yc_ht) return 'default';
      const timePart = yc_ht.split(' ')[1];
      if (!timePart) return 'default';
      const hour = parseInt(timePart.split(':')[0]);
      if (hour >= 8 && hour < 11) return 'morning';
      if (hour >= 11 && hour < 14) return 'noon';
      if (hour >= 14 && hour < 18) return 'afternoon';
      if (hour >= 18 && hour <= 23) return 'evening';
      return 'default';
    }

    function formatTime(dateStr) {
      if (!dateStr) return '—';
      const [date, time] = dateStr.split(' ');
      return time ? time.substring(0, 5) : '—';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const [date] = dateStr.split(' ');
      return date;
    }

    function getFiltered() {
      let list = allOrders;
      if (filterPh !== 'all') list = list.filter(o => phType(o.phuc_hinh) === filterPh);
      if (!filterSearch) return list;
      const q = filterSearch.toLowerCase().trim();
      return list.filter(o =>
        (o.ma_dh       || '').toLowerCase().includes(q) ||
        (o.benh_nhan   || '').toLowerCase().includes(q) ||
        (o.khach_hang  || '').toLowerCase().includes(q) ||
        (o.phuc_hinh   || '').toLowerCase().includes(q) ||
        (o.ghi_chu     || '').toLowerCase().includes(q) ||
        (o.current_stage || '').toLowerCase().includes(q) ||
        (o.loai_lenh   || '').toLowerCase().includes(q) ||
        (o.yc_giao     || '').toLowerCase().includes(q)
      );
    }

    function clearSearch() {
      filterSearch = '';
      const input = document.getElementById('searchInput');
      if (input) input.value = '';
      document.getElementById('searchClear').classList.remove('visible');
      renderCards();
    }

    function groupByCompletionTime(orders) {
      const grouped = new Map();
      orders.forEach(o => {
        const cat = getCompletionTimeGroup(o.yc_ht);
        const key = o.yc_ht || 'no-deadline';
        if (!grouped.has(key)) {
          grouped.set(key, { orders: [], cat });
        }
        grouped.get(key).orders.push(o);
      });
      return grouped;
    }

    function renderCard(o) {
      const stageColor = STAGE_COLORS[o.current_stage] || '#94a3b8';
      const short = STAGE_SHORT[o.current_stage] || o.current_stage;
      const cat = getCompletionTimeGroup(o.yc_ht);
      const urgentBadge = o.urgent ? '<span class="badge badge-urgent">⚡ GẤP</span>' : '';
      const phT = phType(o.phuc_hinh);
      const phBadge = `<span class="ph-badge ph-${phT}">${phShort(o.phuc_hinh)}</span>`;
      const patient = o.benh_nhan && o.benh_nhan !== 'nan' ? o.benh_nhan : '—';

      // Get current KTV - find last stage with KTV (for completed orders) or current stage
      let currentKtv = '';
      if (o.current_stage === 'HOÀN TẤT') {
        // Order completed - get last KTV
        for (let i = o.stagesData.length - 1; i >= 0; i--) {
          if (!o.stagesData[i].sk && o.stagesData[i].k) {
            currentKtv = o.stagesData[i].k;
            break;
          }
        }
      } else {
        // Order in progress - get current stage KTV
        const currentStage = o.stagesData.find(s => !s.sk && s.n === o.current_stage);
        currentKtv = currentStage && currentStage.k ? currentStage.k : '';
      }

      const pipsHtml = o.stagesData.map(s => {
        if (s.sk) return `<div class="stage-pip skip"><div class="pip-fill"></div></div>`;
        const cls = s.x ? 'done' : (s.n === o.current_stage ? 'current' : '');
        return `<div class="stage-pip ${cls}"><div class="pip-fill"></div></div>`;
      }).join('');

      return `
        <div class="card ${cat}" style="cursor: pointer;" data-ma-dh="${o.ma_dh}">
          <div class="card-row1">
            <div class="order-code">${o.ma_dh}</div>
            <div class="card-customer" style="flex: 1; text-align: center; margin: 0;">${o.khach_hang}</div>
            <div class="card-badges">${phBadge}${urgentBadge}</div>
          </div>
          <div class="card-row2">
            <div class="card-patient">${patient}</div>
            <div class="card-sl">SL: ${o.sl}</div>
          </div>
          <div class="card-prosthesis">${o.phuc_hinh}</div>
          ${currentKtv ? `<div class="card-stage-label" style="font-size: 11px; color: var(--text-primary); margin-top: 4px;">👤 ${currentKtv}</div>` : ''}
          ${pipsHtml ? `<div class="stage-pips">${pipsHtml}</div>` : ''}
        </div>
      `;
    }

    function renderCards() {
      const list = getFiltered();
      const container = document.getElementById('cardList');

      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">○</div><p>Không có đơn nào</p></div>';
        return;
      }

      const groups = groupByCompletionTime(list);
      let html = '';

      groups.forEach((group, key) => {
        const { orders, cat } = group;
        const totalSL = orders.reduce((s, o) => s + o.sl, 0);
        const time = formatTime(orders[0].yc_ht);
        const dateRaw = (orders[0].yc_ht || '').split(' ')[0];
        const dateParts = dateRaw ? dateRaw.split('-') : [];
        const dateLabel = dateParts.length === 3 ? `${dateParts[2]}/${dateParts[1]}` : '';

        html += `
          <div class="time-group">
            <div class="time-group-header ${cat}">
              <div class="tg-time">${
                cat === 'morning' ? 'SÁNG' :
                cat === 'noon' ? 'TRƯA' :
                cat === 'afternoon' ? 'CHIỀU' :
                cat === 'evening' ? 'TỐI' :
                'KHÁC'
              }${time !== '—' ? ` · ${time}` : ''}${dateLabel ? ` · ${dateLabel}` : ''}</div>
              <div class="tg-meta">
                <div class="tg-count">${orders.length} đơn · ${totalSL} răng</div>
              </div>
            </div>
            <div class="tg-cards">
              ${orders.map(o => renderCard(o)).join('')}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function updateCounts() {
      // no-op: header replaced by search bar
    }

    // ═════════════════════════════════════════════════════════════
    // INIT
    // ═════════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      // Search input
      const searchInput = document.getElementById('searchInput');
      const searchClear = document.getElementById('searchClear');

      searchInput.addEventListener('input', () => {
        filterSearch = searchInput.value;
        searchClear.classList.toggle('visible', filterSearch.length > 0);
        renderCards();
      });

      (async () => {
        await initUserContext();
        loadData();
        setInterval(loadData, currentUser?.role === 'user' ? 30_000 : 60_000);
        initAdminUI();
      })();

      // Card click → modal
      document.addEventListener('click', (e) => {
        const card = e.target.closest('.card');
        if (card) {
          const maDh = card.getAttribute('data-ma-dh');
          const order = allOrders.find(o => o.ma_dh === maDh);
          if (order) showOrderDetail(order);
        }
      });
    });

    // Modal functions
    function showOrderDetail(o) {
      const stageHtml = o.stagesData.map(s => {
        if (s.sk) return '';
        const icon = s.x ? '✓' : (s.n === o.current_stage ? '●' : '○');
        const status = s.x ? 'Xong' : (s.n === o.current_stage ? 'Đang làm' : 'Chờ');
        const empName = s.k ? ` · ${s.k}` : '';
        return `<div style="display: flex; flex-direction: column; gap: 3px; padding: 8px 0; border-bottom: 1px solid var(--border-card);">
          <div style="display: flex; justify-content: space-between; font-size: 12px;">
            <span style="font-weight: 600;">${icon} ${s.n}${empName}</span>
            <span style="color: var(--text-primary); font-size: 11px;">${status}</span>
          </div>
          ${s.tg ? `<div style="font-size: 11px; color: var(--text-primary);">⏱ ${formatTime(s.tg)}</div>` : ''}
        </div>`;
      }).join('');

      const modalContent = `
        <div style="background: var(--bg-card); border-radius: 8px; padding: 16px; max-height: 80vh; overflow-y: auto;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2 style="font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0;">${o.ma_dh}</h2>
            <div style="cursor: pointer; font-size: 28px; color: var(--text-muted); padding: 8px 12px; border-radius: 6px; background: rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; min-width: 44px; min-height: 44px; transition: all 0.2s;" onclick="closeOrderDetail()" onmouseover="this.style.background='rgba(0,0,0,0.1)'" onmouseout="this.style.background='rgba(0,0,0,0.05)'">✕</div>
          </div>

          <div style="margin-bottom: 14px;">
            <div style="color: var(--text-primary); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">Bệnh nhân</div>
            <div style="font-size: 14px; font-weight: 600; color: var(--text-primary);">${o.benh_nhan || '—'}</div>
          </div>

          <div style="margin-bottom: 14px;">
            <div style="color: var(--text-primary); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">Nha khoa</div>
            <div style="font-size: 14px; font-weight: 600; color: #5d7d70;">${o.khach_hang || '—'}</div>
          </div>

          <div style="margin-bottom: 14px;">
            <div style="color: var(--text-primary); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">Phục hình</div>
            <div style="font-size: 12px; color: var(--terracotta); font-weight: 600;">${o.phuc_hinh || '—'}</div>
          </div>

          <div style="display: flex; gap: 12px; margin-bottom: 14px;">
            <div style="flex: 1;">
              <div style="color: var(--text-primary); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">SL</div>
              <div style="font-size: 14px; font-weight: 700; color: var(--terracotta);">${o.sl}</div>
            </div>
            <div style="flex: 1;">
              <div style="color: var(--text-primary); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">Giao</div>
              <div style="font-size: 12px; font-weight: 600; color: var(--text-primary);">${o.yc_giao || '—'}</div>
            </div>
          </div>

          ${o.ghi_chu ? `<div style="margin-bottom: 14px; padding: 8px; background: rgba(196, 131, 111, 0.1); border-left: 3px solid var(--terracotta-light); border-radius: 4px;">
            <div style="color: var(--text-primary); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">Ghi chú</div>
            <div style="font-size: 12px; color: var(--text-primary);">${o.ghi_chu}</div>
          </div>` : ''}

          <div style="margin-bottom: 14px;">
            <div style="color: var(--text-light); font-size: 10px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Tiến độ công đoạn</div>
            ${stageHtml}
          </div>

          <div style="display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border-card); font-size: 11px; color: var(--text-primary);">
            <span>📥 ${o.nhan || '—'}</span>
            <span>⏱ ${o.yc_ht || '—'}</span>
          </div>
        </div>
      `;

      document.getElementById('modalContent').innerHTML = modalContent;
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeOrderDetail() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    async function initAdminUI() {
      try {
        const r = await fetch('/user');
        if (!r.ok) return;
        const u = await r.json();
        if (u.role === 'admin') {
          document.getElementById('m-export-btn').classList.add('admin-visible');
          const upBtn = document.getElementById('m-upload-btn');
          if (upBtn) upBtn.style.display = '';
          const mungerBtn = document.getElementById('m-munger-btn');
          if (mungerBtn) mungerBtn.style.display = '';
        }
      } catch {}
    }

    async function triggerKeylabExport() {
      const btn = document.getElementById('m-export-btn');
      btn.disabled = true;
      btn.textContent = '⏳';

      try {
        const r = await fetch('/keylab-export-now', { method: 'POST' });
        const data = await r.json();

        if (!data.ok) {
          btn.textContent = '⚠️';
          setTimeout(() => {
            btn.textContent = '🔄';
            btn.disabled = false;
          }, 3500);
          return;
        }

        // Start polling
        pollExportStatusMobile();

      } catch {
        btn.textContent = '❌';
        setTimeout(() => {
          btn.textContent = '🔄';
          btn.disabled = false;
        }, 3500);
      }
    }

    let pollIntervalMobile = null;

    async function pollExportStatusMobile() {
      if (pollIntervalMobile) clearInterval(pollIntervalMobile);

      const btn = document.getElementById('m-export-btn');

      pollIntervalMobile = setInterval(async () => {
        try {
          const exportRes = await fetch('/keylab-export-status');
          const exportData = await exportRes.json();

          if (exportData.running) {
            btn.textContent = '⏳';
            return;
          }

          if (exportData.exitCode !== 0) {
            btn.textContent = '❌';
            clearInterval(pollIntervalMobile);
            setTimeout(() => {
              btn.textContent = '🔄';
              btn.disabled = false;
            }, 3500);
            return;
          }

          const scrapeRes = await fetch('/scrape-status');
          const scrapeData = await scrapeRes.json();

          if (scrapeData.running) {
            btn.textContent = '🔄';
            return;
          }

          if (scrapeData.exitCode === 0) {
            btn.textContent = '✅';
            clearInterval(pollIntervalMobile);
            setTimeout(() => location.reload(), 1000);
          } else {
            btn.textContent = '⚠️';
            clearInterval(pollIntervalMobile);
            setTimeout(() => {
              btn.textContent = '🔄';
              btn.disabled = false;
            }, 3500);
          }

        } catch (err) {
          console.error('Poll error:', err);
        }
      }, 2000);
    }

  </script>

  <!-- Modal -->
  <div id="modalOverlay" style="display: none;">
    <div id="modalContent"></div>
  </div>
</body>
</html>
