<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ASIA LAB — Mobile Dashboard</title>
  <style>
    :root {
      /* Background & Base */
      --bg-primary: #7a9b8a;          /* Sage green */
      --bg-card: #f5f3f0;             /* Cream */
      --border-card: #e0d9d3;         /* Light border */

      /* Terracotta Color Ramp */
      --terracotta-light: #c4836f;    /* Sáng sớm 08:00-11:00 */
      --terracotta: #a85a4f;          /* Chiều 14:00-17:00 */
      --rust-dark: #8b4438;           /* Tối 18:00-21:00 */
      --urgent: #6b4a40;              /* Gấp < 2h */

      /* Text */
      --text-primary: #1a1a1a;        /* Black */
      --text-muted: #d0d0d0;          /* Light gray */
      --text-light: #e0e0e0;          /* Very light gray */

      /* Layout */
      --header-h: 40px;
      --stagetab-h: 44px;
      --toolbar-h: 44px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      font-size: 14px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════
       HEADER
    ═══════════════════════════════ */
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-card);
      height: var(--header-h);
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    /* ═══════════════════════════════
       STAGE TABS
    ═══════════════════════════════ */
    .stage-tabs {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-card);
      height: var(--stagetab-h);
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      position: sticky;
      top: var(--header-h);
      z-index: 190;
      scroll-behavior: smooth;
    }

    .stage-tabs::-webkit-scrollbar {
      display: none;
    }

    .stage-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border: 1px solid var(--border-card);
      border-radius: 6px;
      background: transparent;
      color: var(--text-light);
      font-weight: 500;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .stage-tab:hover {
      border-color: var(--terracotta-light);
      color: var(--terracotta-light);
    }

    .stage-tab.active {
      background: var(--terracotta-light);
      border-color: var(--terracotta-light);
      color: var(--bg-card);
    }

    /* ═══════════════════════════════
       TOOLBAR
    ═══════════════════════════════ */
    .toolbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-card);
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      position: sticky;
      top: calc(var(--header-h) + var(--stagetab-h));
      z-index: 180;
    }

    .toolbar::-webkit-scrollbar {
      display: none;
    }

    .toolbar-chip {
      flex-shrink: 0;
      padding: 6px 12px;
      border: 1px solid var(--border-card);
      border-radius: 5px;
      background: transparent;
      color: var(--text-light);
      font-weight: 500;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toolbar-chip.active {
      background: var(--terracotta-light);
      border-color: var(--terracotta-light);
      color: var(--bg-card);
    }

    /* ═══════════════════════════════
       CARD LIST
    ═══════════════════════════════ */
    #cardList {
      padding: 0;
      padding-bottom: 20px;
    }

    .time-group {
      margin-bottom: 0;
    }

    .time-group-header {
      border-left: 4px solid;
      padding: 8px 12px;
      margin: 12px 12px 6px 12px;
      border-radius: 6px;
      display: flex;
      flex-direction: row;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
    }

    .time-group-header.morning {
      border-left-color: var(--terracotta-light);
      background: rgba(196, 131, 111, 0.12);
    }

    .time-group-header.noon {
      border-left-color: var(--terracotta-light);
      background: rgba(196, 131, 111, 0.12);
    }

    .time-group-header.afternoon {
      border-left-color: var(--terracotta);
      background: rgba(168, 90, 79, 0.12);
    }

    .time-group-header.evening {
      border-left-color: var(--rust-dark);
      background: rgba(139, 68, 56, 0.12);
    }

    .time-group-header.urgent {
      border-left-color: var(--urgent);
      background: rgba(107, 74, 64, 0.15);
    }

    .tg-time {
      font-family: 'Monaco', 'Courier New', monospace;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-primary);
    }

    .tg-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .tg-date {
      font-size: 11px;
      color: var(--text-light);
    }

    .tg-count {
      font-size: 11px;
      color: var(--text-light);
    }

    /* ═══════════════════════════════
       CARDS
    ═══════════════════════════════ */
    .tg-cards {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 12px;
    }

    .card {
      background: var(--terracotta-light);
      border: 1px solid var(--terracotta-light);
      border-left: 3px solid;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
      animation: slideIn 0.3s ease-out backwards;
    }

    .card.morning { border-left-color: var(--terracotta-light); }
    .card.noon { border-left-color: var(--terracotta-light); }
    .card.afternoon { border-left-color: var(--terracotta); }
    .card.evening { border-left-color: var(--rust-dark); }
    .card.urgent { border-left-color: var(--urgent); }

    .card:active {
      transform: scale(0.98);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-row1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3px;
    }

    .order-code {
      font-family: 'Monaco', 'Courier New', monospace;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-primary);
    }

    .card-badges {
      display: flex;
      gap: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
    }

    .badge-urgent {
      background: rgba(168, 90, 79, 0.2);
      color: var(--urgent);
      border: 0.5px solid var(--urgent);
      font-weight: 700;
    }

    .card-row2 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
      font-size: 11px;
      font-weight: 500;
    }

    .card-patient {
      color: var(--text-primary);
      font-weight: 500;
    }

    .card-sl {
      color: #ffffff;
      font-weight: 600;
    }

    .card-customer {
      font-size: 10px;
      color: #ffffff;
      margin-bottom: 2px;
      font-weight: 600;
    }

    .card-prosthesis {
      font-size: 10px;
      color: #ffffff;
      margin-bottom: 2px;
      font-weight: 600;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 4px;
      border-top: 1px solid var(--border-card);
    }

    .card-stage-label {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 14px;
      font-weight: 500;
    }

    /* ── MODAL ─── */
    #modalOverlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      display: flex !important;
      align-items: center;
      justify-content: center;
    }
    #modalOverlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    #modalContent {
      width: 90%;
      max-width: 400px;
      max-height: 85vh;
      z-index: 1000;
    }

    /* ── STAGE PROGRESS DOTS ─── */
    .stage-pips {
      display: flex;
      gap: 4px;
      margin-bottom: 3px;
    }
    .stage-pip {
      flex: 1;
      height: 5px;
      border-radius: 3px;
      background: var(--border-card);
      position: relative;
      overflow: hidden;
    }
    .stage-pip.skip {
      opacity: 0.25;
      background: repeating-linear-gradient(90deg, var(--border-card) 0, var(--border-card) 3px, transparent 3px, transparent 6px);
    }
    .stage-pip .pip-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      border-radius: 3px;
      background: var(--terracotta);
      width: 0;
    }
    .stage-pip.done .pip-fill { width: 100%; }
    .stage-pip.current .pip-fill { width: 50%; animation: pulse-pip 1.5s ease-in-out infinite; }
    @keyframes pulse-pip { 0%,100% { opacity:0.55; } 50% { opacity:1; } }

    /* ── FONT SCALE +30% ─── */
    html { font-size: 18px; }
    .logo { font-size: 21px; }
    .hstat .n { font-size: 18px; }
    .hstat .l { font-size: 12px; }
    .header-date { font-size: 13px; }
    .stage-tab { font-size: 16px; }
    .toolbar-chip { font-size: 14px; }
    .tg-time { font-size: 17px; }
    .tg-date, .tg-count { font-size: 14px; }
    .order-code { font-size: 17px; }
    .badge { font-size: 12px; }
    .card-row2 { font-size: 14px; }
    .card-customer { font-size: 13px; }
    .card-prosthesis { font-size: 13px; }
    .card-stage-label { font-size: 13px; }
    .empty-state p { font-size: 18px; }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div id="headerContent" style="display: flex; align-items: center; gap: 12px; width: 100%; font-size: 13px; font-weight: 600; color: var(--text-primary);">
      <span id="headerTimeCat">—</span>
      <span style="color: var(--text-light);">·</span>
      <span id="headerTime">—</span>
      <span style="color: var(--text-light);">·</span>
      <span id="headerOrderCount">0 đơn</span>
      <span style="color: var(--text-light);">·</span>
      <span id="headerToothCount">0 răng</span>
    </div>
  </header>

  <!-- Stage Tabs -->
  <div class="stage-tabs" id="stageTabs"></div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar"></div>

  <!-- Card List -->
  <div id="cardList"></div>

  <script>
    const STAGE_NAMES = ['CBM', 'SÁP/Cadcam', 'SƯỜN', 'ĐẮP', 'MÀI'];
    const STAGE_COLORS = {
      'CBM': '#3b82f6',
      'SÁP/Cadcam': '#a855f7',
      'SƯỜN': '#f59e0b',
      'ĐẮP': '#f97316',
      'MÀI': '#10b981'
    };

    const STAGE_SHORT = {
      'CBM': 'CBM',
      'SÁP/Cadcam': 'SÁP',
      'SƯỜN': 'SƯỜN',
      'ĐẮP': 'ĐẮP',
      'MÀI': 'MÀI',
      'HOÀN TẤT': '✓'
    };

    function adaptOrder(o) {
      let current_stage = 'HOÀN TẤT';
      if (o.stages) {
        const active = o.stages.find(s => !s.sk && !s.x);
        if (active) current_stage = active.n;
      }
      const urgent = o.yc_ht
        ? (new Date(o.yc_ht) - Date.now()) < 2 * 3600 * 1000
        : false;
      return {
        ma_dh:         o.ma_dh,
        benh_nhan:     o.bn || '',
        khach_hang:    o.kh || '',
        phuc_hinh:     o.ph || '',
        sl:            o.sl || 0,
        ghi_chu:       o.gc || '',
        current_stage,
        yc_ht:         o.yc_ht || '',
        yc_giao:       o.yc_giao || '',
        nhan:          o.nhan || '',
        loai_lenh:     o.lk || '',
        urgent,
        stagesData:    o.stages || [],
      };
    }

    let allOrders = [];
    let filterStage = 'all';
    let filterDelivery = 'all';

    async function loadData() {
      try {
        const res = await fetch('/data.json');
        const json = await res.json();
        allOrders = (json.orders || []).map(adaptOrder);
        updateCounts();
        renderCards();
      } catch (e) {
        console.error('Lỗi fetch data:', e);
      }
    }

    // ═════════════════════════════════════════════════════════════
    // HELPERS
    // ═════════════════════════════════════════════════════════════
    function getCompletionTimeGroup(yc_ht) {
      if (!yc_ht) return 'default';
      const timePart = yc_ht.split(' ')[1];
      if (!timePart) return 'default';
      const hour = parseInt(timePart.split(':')[0]);
      if (hour >= 8 && hour < 11) return 'morning';
      if (hour >= 11 && hour < 14) return 'noon';
      if (hour >= 14 && hour < 18) return 'afternoon';
      if (hour >= 18 && hour <= 23) return 'evening';
      return 'default';
    }

    function formatTime(dateStr) {
      if (!dateStr) return '—';
      const [date, time] = dateStr.split(' ');
      return time ? time.substring(0, 5) : '—';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const [date] = dateStr.split(' ');
      return date;
    }

    function getFiltered() {
      return allOrders.filter(o => {
        if (filterStage !== 'all' && o.current_stage !== filterStage) return false;
        if (filterDelivery === 'today') {
          const today = new Date().toISOString().split('T')[0];
          if (!o.yc_giao.startsWith(today)) return false;
        }
        if (filterDelivery === 'urgent' && !o.urgent) return false;
        return true;
      });
    }

    function groupByCompletionTime(orders) {
      const grouped = new Map();
      orders.forEach(o => {
        const cat = getCompletionTimeGroup(o.yc_ht);
        const key = o.yc_ht || 'no-deadline';
        if (!grouped.has(key)) {
          grouped.set(key, { orders: [], cat });
        }
        grouped.get(key).orders.push(o);
      });
      return grouped;
    }

    function renderCard(o) {
      const stageColor = STAGE_COLORS[o.current_stage] || '#94a3b8';
      const short = STAGE_SHORT[o.current_stage] || o.current_stage;
      const cat = getCompletionTimeGroup(o.yc_ht);
      const urgentBadge = o.urgent ? '<span class="badge badge-urgent">⚡ GẤP</span>' : '';
      const patient = o.benh_nhan && o.benh_nhan !== 'nan' ? o.benh_nhan : '—';

      const pipsHtml = o.stagesData.map(s => {
        if (s.sk) return `<div class="stage-pip skip"><div class="pip-fill"></div></div>`;
        const cls = s.x ? 'done' : (s.n === o.current_stage ? 'current' : '');
        return `<div class="stage-pip ${cls}"><div class="pip-fill"></div></div>`;
      }).join('');

      return `
        <div class="card ${cat}" style="cursor: pointer;" data-ma-dh="${o.ma_dh}">
          <div class="card-row1">
            <div class="order-code">${o.ma_dh}</div>
            <div class="card-customer" style="flex: 1; text-align: center; margin: 0;">${o.khach_hang}</div>
            <div class="card-badges">${urgentBadge}</div>
          </div>
          <div class="card-row2">
            <div class="card-patient">${patient}</div>
            <div class="card-sl">SL: ${o.sl}</div>
          </div>
          <div class="card-prosthesis">${o.phuc_hinh}</div>
          ${pipsHtml ? `<div class="stage-pips">${pipsHtml}</div>` : ''}
        </div>
      `;
    }

    function renderCards() {
      const list = getFiltered();
      const container = document.getElementById('cardList');

      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">○</div><p>Không có đơn nào</p></div>';
        return;
      }

      const groups = groupByCompletionTime(list);
      let html = '';

      groups.forEach((group, key) => {
        const { orders, cat } = group;
        const totalSL = orders.reduce((s, o) => s + o.sl, 0);
        const time = formatTime(orders[0].yc_ht);

        html += `
          <div class="time-group">
            <div class="time-group-header ${cat}">
              <div class="tg-time">${
                cat === 'morning' ? 'SÁNG' :
                cat === 'noon' ? 'TRƯA' :
                cat === 'afternoon' ? 'CHIỀU' :
                cat === 'evening' ? 'TỐI' :
                'KHÁC'
              } · ${time}</div>
              <div class="tg-meta">
                <div class="tg-count">${orders.length} đơn · ${totalSL} răng</div>
              </div>
            </div>
            <div class="tg-cards">
              ${orders.map(o => renderCard(o)).join('')}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function updateCounts() {
      const now = new Date();
      const hour = now.getHours();
      const timeMin = String(now.getMinutes()).padStart(2, '0');

      // Get time category (English internal)
      let timeCatEn = 'default';
      let timeCatVi = 'KHÁC';
      if (hour >= 8 && hour < 11) { timeCatEn = 'morning'; timeCatVi = 'SÁNG'; }
      else if (hour >= 11 && hour < 14) { timeCatEn = 'noon'; timeCatVi = 'TRƯA'; }
      else if (hour >= 14 && hour < 18) { timeCatEn = 'afternoon'; timeCatVi = 'CHIỀU'; }
      else if (hour >= 18 && hour <= 23) { timeCatEn = 'evening'; timeCatVi = 'TỐI'; }

      // Count orders in current time category
      const ordersInCat = getFiltered().filter(o => getCompletionTimeGroup(o.yc_ht) === timeCatEn);
      const toothCount = ordersInCat.reduce((sum, o) => sum + o.sl, 0);

      document.getElementById('headerTimeCat').textContent = timeCatVi;
      document.getElementById('headerTime').textContent = `${hour}:${timeMin}`;
      document.getElementById('headerOrderCount').textContent = `${ordersInCat.length} đơn`;
      document.getElementById('headerToothCount').textContent = `${toothCount} răng`;
    }

    // ═════════════════════════════════════════════════════════════
    // INIT
    // ═════════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      // Render stage tabs
      const stageTabs = document.getElementById('stageTabs');
      stageTabs.innerHTML = '<div class="stage-tab active" data-stage="all">ALL</div>' +
        STAGE_NAMES.map(s => `<div class="stage-tab" data-stage="${s}">${s}</div>`).join('');

      document.querySelectorAll('.stage-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.stage-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          filterStage = tab.dataset.stage;
          renderCards();
        });
      });

      // Render toolbar
      const toolbar = document.getElementById('toolbar');
      toolbar.innerHTML = `
        <div class="toolbar-chip active" data-filter="all">ALL</div>
        <div class="toolbar-chip" data-filter="today">TODAY</div>
        <div class="toolbar-chip" data-filter="urgent">⚡ GẤP</div>
      `;

      document.querySelectorAll('.toolbar-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.toolbar-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          filterDelivery = chip.dataset.filter;
          renderCards();
        });
      });

      loadData();
      setInterval(loadData, 60_000);

      // Add click handlers to cards
      document.addEventListener('click', (e) => {
        const card = e.target.closest('.card');
        if (card) {
          const maDh = card.getAttribute('data-ma-dh');
          const order = allOrders.find(o => o.ma_dh === maDh);
          if (order) showOrderDetail(order);
        }
      });
    });

    // Modal functions
    function showOrderDetail(o) {
      const stageHtml = o.stagesData.map(s => {
        if (s.sk) return '';
        const icon = s.x ? '✓' : (s.n === o.current_stage ? '●' : '○');
        const status = s.x ? 'Xong' : (s.n === o.current_stage ? 'Đang làm' : 'Chờ');
        const empName = s.k ? ` · ${s.k}` : '';
        return `<div style="display: flex; flex-direction: column; gap: 3px; padding: 8px 0; border-bottom: 1px solid var(--border-card);">
          <div style="display: flex; justify-content: space-between; font-size: 12px;">
            <span style="font-weight: 600;">${icon} ${s.n}${empName}</span>
            <span style="color: var(--text-light); font-size: 11px;">${status}</span>
          </div>
          ${s.tg ? `<div style="font-size: 11px; color: var(--text-light);">⏱ ${formatTime(s.tg)}</div>` : ''}
        </div>`;
      }).join('');

      const modalContent = `
        <div style="background: var(--bg-card); border-radius: 8px; padding: 16px; max-height: 80vh; overflow-y: auto;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2 style="font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0;">${o.ma_dh}</h2>
            <div style="cursor: pointer; font-size: 28px; color: var(--text-muted); padding: 8px 12px; border-radius: 6px; background: rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; min-width: 44px; min-height: 44px; transition: all 0.2s;" onclick="closeOrderDetail()" onmouseover="this.style.background='rgba(0,0,0,0.1)'" onmouseout="this.style.background='rgba(0,0,0,0.05)'">✕</div>
          </div>

          <div style="margin-bottom: 14px;">
            <div style="color: var(--text-light); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">Bệnh nhân</div>
            <div style="font-size: 14px; font-weight: 600; color: var(--text-primary);">${o.benh_nhan || '—'}</div>
          </div>

          <div style="margin-bottom: 14px;">
            <div style="color: var(--text-light); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">Nha khoa</div>
            <div style="font-size: 14px; font-weight: 600; color: #5d7d70;">${o.khach_hang || '—'}</div>
          </div>

          <div style="margin-bottom: 14px;">
            <div style="color: var(--text-light); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">Phục hình</div>
            <div style="font-size: 12px; color: var(--terracotta); font-weight: 600;">${o.phuc_hinh || '—'}</div>
          </div>

          <div style="display: flex; gap: 12px; margin-bottom: 14px;">
            <div style="flex: 1;">
              <div style="color: var(--text-light); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">SL</div>
              <div style="font-size: 14px; font-weight: 700; color: var(--terracotta);">${o.sl}</div>
            </div>
            <div style="flex: 1;">
              <div style="color: var(--text-light); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">Giao</div>
              <div style="font-size: 12px; font-weight: 600; color: var(--text-primary);">${o.yc_giao || '—'}</div>
            </div>
          </div>

          ${o.ghi_chu ? `<div style="margin-bottom: 14px; padding: 8px; background: rgba(196, 131, 111, 0.1); border-left: 3px solid var(--terracotta-light); border-radius: 4px;">
            <div style="color: var(--text-light); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">Ghi chú</div>
            <div style="font-size: 12px; color: var(--text-primary);">${o.ghi_chu}</div>
          </div>` : ''}

          <div style="margin-bottom: 14px;">
            <div style="color: var(--text-light); font-size: 10px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Tiến độ công đoạn</div>
            ${stageHtml}
          </div>

          <div style="display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border-card); font-size: 11px; color: var(--text-light);">
            <span>📥 ${o.nhan || '—'}</span>
            <span>⏱ ${o.yc_ht || '—'}</span>
          </div>
        </div>
      `;

      document.getElementById('modalContent').innerHTML = modalContent;
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeOrderDetail() {
      document.getElementById('modalOverlay').classList.remove('open');
    }
  </script>

  <!-- Modal -->
  <div id="modalOverlay" style="display: none;">
    <div id="modalContent"></div>
  </div>
</body>
</html>
