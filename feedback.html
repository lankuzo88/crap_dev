<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Feedback - ASIA LAB</title>
<style>
body{font-family:Arial;padding:20px;background:#0c0f18;color:#e8edf8;}
.container{max-width:1200px;margin:0 auto;}
h1{color:#f5a623;}
.section{background:#141824;border:1px solid #252d42;border-radius:10px;padding:20px;margin-bottom:20px;}
input,select,textarea{width:100%;padding:10px;margin:5px 0;background:#1a2030;border:1px solid #252d42;color:#e8edf8;border-radius:6px;}
button{background:#f5a623;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:600;}
.fb-card{background:#1a2030;border:1px solid #252d42;padding:15px;margin:10px 0;border-radius:8px;}
.filter-btn{background:#1a2030;border:1px solid #252d42;padding:6px 12px;margin:5px;border-radius:6px;cursor:pointer;color:#e8edf8;}
.filter-btn.active{background:#f5a623;color:#000;}
</style>
</head>
<body>
<div class="container">
<h1>Feedback System</h1>
<a href="/" style="color:#f5a623">Back to Dashboard</a>

<div class="section">
<h3>New Feedback</h3>
<form id="fbForm">
<input type="text" id="ma_dh" placeholder="Order ID" required>
<select id="type_id" required></select>
<select id="severity"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select>
<textarea id="desc" placeholder="Description" required></textarea>
<button type="submit">Submit</button>
</form>
</div>

<div class="section">
<h3>Feedbacks</h3>
<div>
<button class="filter-btn active" onclick="filter('all')">All</button>
<button class="filter-btn" onclick="filter('open')">Open</button>
<button class="filter-btn" onclick="filter('resolved')">Resolved</button>
</div>
<div id="list"></div>
</div>
</div>

<script>
let types=[];
async function init(){
const r=await fetch('/api/feedback/types');
types=(await r.json()).data;
document.getElementById('type_id').innerHTML=types.map(t=>'<option value="'+t.id+'">'+t.name+'</option>').join('');
load();
}
async function load(s){
const r=await fetch(s?'/api/feedbacks?status='+s:'/api/feedbacks');
const fbs=(await r.json()).data;
document.getElementById('list').innerHTML=fbs.map(f=>'<div class="fb-card"><b>'+f.ma_dh+'</b> - '+f.type_name+' ['+f.severity+']<br>'+f.description+'<br><small>'+f.reported_by+' '+f.created_at+'</small><br><select onchange="upd('+f.id+',this.value)"><option '+(f.status=='open'?'selected':'')+'>open</option><option '+(f.status=='in_progress'?'selected':'')+'>in_progress</option><option '+(f.status=='resolved'?'selected':'')+'>resolved</option></select></div>').join('');
}
function filter(s){
document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
load(s=='all'?null:s);
}
document.getElementById('fbForm').onsubmit=async(e)=>{
e.preventDefault();
await fetch('/api/feedbacks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ma_dh:document.getElementById('ma_dh').value,feedback_type_id:+document.getElementById('type_id').value,severity:document.getElementById('severity').value,description:document.getElementById('desc').value})});
alert('Submitted');
e.target.reset();
load();
};
async function upd(id,s){
await fetch('/api/feedbacks/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})});
load();
}
init();
</script>
</body>
</html>
